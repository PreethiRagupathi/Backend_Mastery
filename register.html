<!doctype html>
<html lang="en">
  <head>

            />

          <br />

            <label for="email">Email:</label>

          <div class="row">
            <label for="password">Password:</label>

            />

            <label for="mobileno">Mobile Number:</label>

          <div class="ss">

        </div>
      </form>
    </div>
  </body>
</html>
