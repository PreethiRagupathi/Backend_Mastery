<!doctype html>
<html lang="en">
  <head>
    <title>Github User Search</title>
  </head>
  <body>
    <style>
      #search-button {
        margin-top: 10px;
        border-radius: 5px;
        border: 1px solid;
        font-size: 14px;
      }
      input[type="text"] {
        margin-top: 10px;
        border-radius: 5px;
        border: 1px solid;
        font-size: 14px;
      }
      #result {
        margin-top: 10px;
        border-radius: 5px;
        border: 1px solid;
        font-size: 14px;
        background-color: wheat;
      }
    </style>
    <form>
      <label for="username">Enter Github Username</label>
      <input
        type="text"
        id="username"
        required
        placeholder="Enter Github Username"
      />
      <br />
      <button type="button" id="search-button" onclick="performsearch(event)">
        Search
      </button>
      <div>
        <h3>Result Section</h3>
        <ul id="result"></ul>
      </div>
    </form>
    <script>
      async function performsearch(event) {
        const result = document.getElementById("result");
        try {
          const username = document.getElementById("username").value;
          console.log("searching...");
          const response = await fetch(
            `https://api.github.com/users/${username}`,
          );
          if (!response.ok) {
            throw new Error("User not found");
          }
          const data = await response.json();
          console.log(data);
          result.innerHTML =
            `<li>User Name: ${data.login}</li>` +
            `<li>Followers: ${data.followers}</li>` +
            `<li>Following: ${data.following}</li>` +
            `<li>Repositories: ${data.public_repos}</li>`;
          console.log(result);
        } catch (error) {
          console.log("Error occured", error);
          result.innerHTML = `User not found`;
        }
      }
    </script>
  </body>
</html>
